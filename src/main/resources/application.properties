spring.application.name=demo

# issuer (org or custom)
spring.security.oauth2.client.provider.okta.issuer-uri=https://integrator-6899520.okta.com/oauth2/default

spring.security.oauth2.client.registration.okta.client-id=0oa10ztwd1wh2q4Pa698
spring.security.oauth2.client.registration.okta.client-secret=TiY3NO5JjYY-0UxQ2MrMg2OYE3YrcAaXwdsiZ1gEkFrwd-YCZ_Dg7p37e2rQeKLl

# Use Spring Boot default handler path for OAuth2 login (fast, reliable)
spring.security.oauth2.client.registration.okta.redirect-uri=http://localhost:8080/authorization-code/callback

spring.security.oauth2.client.registration.okta.scope=openid,profile,email
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

logging.level.org.springframework.security.oauth2.client=DEBUG
logging.level.org.springframework.security.oauth2.core=DEBUG
logging.level.org.thymeleaf=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG

# Thymeleaf configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.view-names=*
spring.thymeleaf.order=1

# Show auto-configuration report
debug=false